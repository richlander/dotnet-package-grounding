name: update-harness

# Periodically bump the pinned dotnet/skills commit so we "take updates from
# dotnet/skills" without vendoring its source. We build skill-validator from
# this commit (see eng/run-evals.sh). Opens a PR with the new SHA.
on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve dotnet/skills main HEAD
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sha=$(gh api repos/dotnet/skills/commits/main -q .sha)
          [ -n "$sha" ] || { echo "Could not resolve SHA"; exit 1; }
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "short=${sha:0:8}" >> "$GITHUB_OUTPUT"

      - name: Update eng/skill-validator.sha
        run: echo "${{ steps.latest.outputs.sha }}" > eng/skill-validator.sha

      - name: Open PR if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet eng/skill-validator.sha; then
            echo "Already up to date."; exit 0
          fi
          branch="bump-skill-validator-${{ steps.latest.outputs.short }}"
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -b "$branch"
          git commit -am "Bump skill-validator to dotnet/skills@${{ steps.latest.outputs.short }}"
          git push -u origin "$branch"
          gh pr create --fill --title "Bump skill-validator to dotnet/skills@${{ steps.latest.outputs.short }}" \
            --body "Automated harness update: rebuild skill-validator from the latest dotnet/skills main commit."
