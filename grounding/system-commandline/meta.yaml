# Metadata used to generate SKILL.md from AGENTS.md for the eval harness.
# AGENTS.md is the source of truth; SKILL.md is generated by eng/sync-skill.
# `name` must be lowercase alphanumeric + hyphens and match the directory name.
# `package` is the NuGet package this grounding ships in (informational).
name: system-commandline
package: System.CommandLine
description: >-
  Guidance for System.CommandLine 3.x: what's new in 3.x over 2.x (additive,
  no breaking changes), how to migrate 2.x to 3.x (drop-in version bump), and how
  to migrate from 2.0.0-beta to the 2.x/3.x GA API (the large breaking redesign of
  the invocation and binding stack). Use when creating, updating, or migrating a
  .NET command-line application that uses System.CommandLine.
