config:
  # Two self-contained scenarios; run them in parallel to save wall-clock.
  max_parallel_scenarios: 2

scenarios:
  # ---------------------------------------------------------------------------
  # G1 — Greenfield adoption. The fixture is a fresh `dotnet new console` app that
  # already references System.CommandLine 3.x but does no parsing yet. The agent
  # must build a real CLI using the 3.x API.
  #
  # This discriminates strongly because almost all System.CommandLine code in the
  # training data uses the OLD 2.0.0-beta API (Handler.SetHandler, AddOption,
  # AddCommand, `new Option<T>(aliases, getDefaultValue, description)`,
  # rootCommand.InvokeAsync(args)). That API was REMOVED before 3.x and does not
  # compile against it. With web tools blocked, a baseline agent writes beta-style
  # code from memory and the build fails; the grounded agent knows the current API
  # (Option<T>(name, ...aliases) + DefaultValueFactory, Options.Add/Subcommands.Add,
  # SetAction + ParseResult.GetValue, Parse(args).Invoke()) and succeeds.
  # ---------------------------------------------------------------------------

  - name: "G1: greenfield CLI on System.CommandLine 3.x"
    prompt: |
      This is a fresh console app that already references System.CommandLine 3.x
      (see Greenfield.csproj). Replace the placeholder Program.cs with a real CLI
      built on System.CommandLine. Requirements:

        - A root command with a description.
        - A `greet` subcommand with:
            - a `--name` string option that defaults to `World`.
            - a `--count` integer option (also available as `-c`) that defaults to 1.
        - Running `greet` prints `Hello, <name>!` on its own line, repeated `count`
          times.

      Use the System.CommandLine 3.x API. The project must build and run.
    setup:
      files:
        - path: Greenfield.csproj
          source: fixtures/console/Greenfield.csproj
        - path: Program.cs
          source: fixtures/console/Program.cs
    reject_tools:
      - web_search
      - web_fetch
    assertions:
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "build"
        expected_exit_code: 0
        command_timeout: 600
      # Default name resolves to World.
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build -- greet"
        expected_exit_code: 0
        expected_std_output_contains: "Hello, World!"
      # --name is honoured.
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build -- greet --name Ada"
        expected_exit_code: 0
        expected_std_output_contains: "Hello, Ada!"
      # --count and its short alias -c repeat the greeting (>= 3 occurrences).
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build -- greet --name Ada -c 3"
        expected_exit_code: 0
        expected_std_output_matches: "(Hello, Ada![\\s\\S]*){3}"
    rubric:
      - "Builds a CLI on System.CommandLine 3.x that compiles and runs"
      - "Uses the current 3.x API, NOT the removed beta API (no Handler.SetHandler, AddOption/AddCommand, or `new Option<T>(aliases, getDefaultValue, ...)`)"
      - "Defines a greet subcommand with --name (default World) and --count/-c (default 1)"
      - "Reads values via ParseResult.GetValue inside SetAction (not handler-binding by parameter)"
      - "greet prints `Hello, <name>!` once per count, honouring --name and -c"
    timeout: 600

  # ---------------------------------------------------------------------------
  # M1 — 2.0.0-beta to 3.x migration of a REAL beta4 CLI (vendored ZeroDaySearch).
  # The beta API it uses (Handler.SetHandler, AddOption, getDefaultValue, beta
  # constructors, rootCommand.InvokeAsync(args)) was removed before GA, so a literal
  # version bump does NOT compile — the agent must know the precise beta -> 3.x
  # member mapping to migrate every command.
  # ---------------------------------------------------------------------------

  - name: "M1: migrate a System.CommandLine 2.0.0-beta4 CLI to 3.x"
    prompt: |
      This project (ZeroDaySearch) targets System.CommandLine `2.0.0-beta4.22272.1`,
      which uses an API that was removed before the 2.0 GA release. Migrate it to the
      latest System.CommandLine 3.x so it builds against the current API:
      set the System.CommandLine package version in the .csproj to
      `3.0.0-preview.5.26302.115`, and update Program.cs to the current API.
      Preserve every existing command (list, search, severity, product, platform,
      date, summary), their options and arguments, and their behavior. The migrated
      project must compile.
    setup:
      files:
        - path: ZeroDaySearch.csproj
          source: fixtures/zeroday/ZeroDaySearch.csproj
        - path: Program.cs
          source: fixtures/zeroday/Program.cs
        - path: CveDataSource.cs
          source: fixtures/zeroday/CveDataSource.cs
        - path: CveFormatter.cs
          source: fixtures/zeroday/CveFormatter.cs
        - path: Models.cs
          source: fixtures/zeroday/Models.cs
    reject_tools:
      - web_search
      - web_fetch
    assertions:
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "build"
        expected_exit_code: 0
        command_timeout: 600
      - type: file_contains
        path: "ZeroDaySearch.csproj"
        value: "3.0.0-preview"
      - type: file_not_contains
        path: "Program.cs"
        value: "SetHandler"
      - type: file_not_contains
        path: "Program.cs"
        value: "AddOption"
      - type: file_not_contains
        path: "Program.cs"
        value: "getDefaultValue"
    rubric:
      - "Bumps System.CommandLine to 3.x in the .csproj"
      - "Replaces Handler.SetHandler with command.SetAction reading values via ParseResult.GetValue"
      - "Replaces AddOption/AddArgument/AddCommand with Options.Add/Arguments.Add/Subcommands.Add"
      - "Replaces getDefaultValue: with DefaultValueFactory and updates the option/argument constructors"
      - "Replaces rootCommand.InvokeAsync(args) with rootCommand.Parse(args).Invoke() or InvokeAsync()"
      - "All seven commands and their options/arguments are preserved; the project compiles"
    timeout: 900
